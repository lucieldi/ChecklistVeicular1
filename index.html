<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Checklist</title>
    <script>
      // Suppress benign Vite WebSocket connection errors in this environment
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason && (
          event.reason.message === 'WebSocket closed without opened.' || 
          (typeof event.reason === 'string' && event.reason.includes('vite')) ||
          (event.reason.stack && event.reason.stack.includes('vite/dist/client'))
        )) {
          event.preventDefault();
        }
      });
      // Also intercept console errors from Vite
      const originalError = console.error;
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('[vite] failed to connect to websocket')) {
          return;
        }
        originalError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
