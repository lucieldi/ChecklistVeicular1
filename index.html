<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Checklist</title>
    <script>
      // Suppress benign Vite WebSocket connection errors in this environment
      const isBenignError = (err) => {
        if (!err) return false;
        const msg = err.message || (typeof err === 'string' ? err : '');
        const stack = err.stack || '';
        return (
          msg.includes('WebSocket closed') ||
          msg.includes('vite') ||
          stack.includes('vite/dist/client')
        );
      };

      window.addEventListener('unhandledrejection', (event) => {
        if (isBenignError(event.reason)) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      window.addEventListener('error', (event) => {
        if (isBenignError(event.error) || isBenignError(event.message)) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      // Intercept console errors
      const originalError = console.error;
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && (
          args[0].includes('[vite] failed to connect to websocket') ||
          args[0].includes('WebSocket closed')
        )) {
          return;
        }
        originalError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
